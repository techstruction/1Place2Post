server {
    listen 80;
    server_name 1place2post.techstruction.co;

    # Use Docker's internal DNS so container IPs are re-resolved after rebuilds
    resolver 127.0.0.11 valid=10s ipv6=off;

    # API — proxy /api/* to the NestJS backend
    set $api_upstream http://1p_api_prod:35763;
    location /api {
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Web — proxy everything else to the Next.js frontend
    set $web_upstream http://1p_web_prod:3000;
    location / {
        proxy_pass $web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
