services:
  1p_api_st:
    container_name: 1p_api_st
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    env_file:
      - ../.env.staging
    environment:
      - NODE_ENV=production
      - APP_ENV=staging
      - PORT=35764
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:35764/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - proxy

  1p_web_st:
    container_name: 1p_web_st
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://1place2post-st.techstruction.co/api
    env_file:
      - ../.env.staging
    environment:
      - NODE_ENV=production
    depends_on:
      1p_api_st:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - proxy

networks:
  proxy:
    external: true
