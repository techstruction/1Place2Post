services:
  1p_api_prod:
    container_name: 1p_api_prod
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    env_file:
      - ../.env.prod
    environment:
      - NODE_ENV=production
      - APP_ENV=prod
      - PORT=35763
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:35763/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - proxy

  1p_web_prod:
    container_name: 1p_web_prod
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://1place2post.techstruction.co/api
    env_file:
      - ../.env.prod
    environment:
      - NODE_ENV=production
    depends_on:
      1p_api_prod:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - proxy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - proxy

networks:
  proxy:
    external: true

volumes:
  redis_data:
